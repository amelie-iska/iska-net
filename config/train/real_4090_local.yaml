seed: 83
stage:
  name: real_4090_sft
run:
  output_dir: outputs/real_4090_local
  device: cuda
train:
  batch_size: 2
  eval_batch_size: 4
  num_workers: 2
  max_steps: 500
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  weight_decay: 0.01
  scheduler: cosine
  max_grad_norm: 1.0
  amp: true
  log_every: 10
  eval_every: 100
  checkpoint_every: 250
loss:
  topology_weight: 0.05
tropical:
  enabled: true
  temperature: 1.0
  temperature_min: 0.4
  anneal_steps: 500
wandb:
  enabled: false
  project: iska-ugm
  mode: offline
  group: real-4090-local
  tags:
    - real-data
    - local-4090
    - random-order
