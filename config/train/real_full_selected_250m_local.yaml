seed: 83
stage:
  name: real_full_selected_sft_250m
run:
  output_dir: outputs/real_full_selected_250m_local
  device: cuda
train:
  batch_size: 6
  eval_batch_size: 6
  num_workers: 8
  eval_num_workers: 2
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  max_steps: full_epoch
  full_epochs: 1.0
  gradient_accumulation_steps: 6
  learning_rate: 0.0002
  weight_decay: 0.01
  scheduler: cosine
  max_grad_norm: 1.0
  amp: true
  log_every: 10
  eval_every: 10000
  eval_max_batches: 512
  checkpoint_every: 5000
loss:
  topology_weight: 0.0
  numeric_diffusion_weight: 0.0
tropical:
  enabled: true
  temperature: 1.0
  temperature_min: 0.4
  anneal_steps: 2000
wandb:
  enabled: false
  project: iska-ugm
  mode: offline
  group: real-full-selected-250m-local
  tags:
    - real-data
    - full-selected-public-hf
    - local-4090
    - random-order
    - 250m
