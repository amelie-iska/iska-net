seed: 73
stage:
  name: multimodal_phase2
run:
  output_dir: outputs/multimodal_phase2_tiny
  device: cuda
train:
  batch_size: 2
  eval_batch_size: 2
  num_workers: 0
  max_steps: 20
  gradient_accumulation_steps: 1
  learning_rate: 0.0003
  weight_decay: 0.01
  scheduler: cosine
  max_grad_norm: 1.0
  amp: true
  log_every: 5
  eval_every: 10
  checkpoint_every: 20
loss:
  topology_weight: 0.05
  numeric_diffusion_weight: 0.15
tropical:
  enabled: true
  temperature: 1.0
  temperature_min: 0.5
  anneal_steps: 20
wandb:
  enabled: false
  project: iska-ugm
  mode: offline
