seed: 83
stage:
  name: structure_dynamics_phase2
run:
  output_dir: outputs/structure_dynamics_4090
  device: cuda
  train_disabled: true
  disable_reason: "Actual structure-file or trajectory-derived training is disabled for the current curriculum. Use this dataset for validation/test/evaluation only until the structure phase is explicitly approved."
train:
  batch_size: 1
  eval_batch_size: 1
  num_workers: 0
  max_steps: 3000
  gradient_accumulation_steps: 32
  learning_rate: 0.00012
  weight_decay: 0.01
  scheduler: cosine
  max_grad_norm: 1.0
  amp: true
  log_every: 10
  eval_every: 250
  checkpoint_every: 500
loss:
  topology_weight: 0.05
tropical:
  enabled: true
  temperature: 1.0
  temperature_min: 0.35
  anneal_steps: 3000
wandb:
  enabled: false
  project: iska-ugm
  mode: offline
