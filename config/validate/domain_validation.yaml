validation:
  checkpoint: outputs/synthetic_graph_pretrain/checkpoint_final.pt
  vocab: outputs/synthetic_graph_pretrain/vocab.jsonl
  data_path: data/processed/mixed_graphs/train.jsonl
  batch_size: 8
  device: cuda
  metrics:
