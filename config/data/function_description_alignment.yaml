data:
  train_path: data/processed/function_description_alignment/train.jsonl
  val_path: data/processed/function_description_alignment/val.jsonl
  vocab_path: outputs/function_description_alignment/vocab.jsonl
  reuse_vocab: false
  min_freq: 1
  max_vocab_size: 262144
  max_source_tokens: 1024
  max_target_tokens: 160
  max_seq_len: 1024
  order_mode: sample
  enforce_sequence_only_molecules: true
  forbid_actual_structure_files: true
  allow_geometric_features: false
  extra_vocab_paths:
    - data/processed/reference_tokens/naturelm_unigenx_tokens.txt
    - data/processed/reference_tokens/motif_graph_tokens.txt
    - data/processed/reference_tokens/multimodal_graph_tokens.txt
