data:
  train_path: data/processed/real_full_selected_mix/train.jsonl
  val_path: data/processed/real_full_selected_mix/val.jsonl
  vocab_path: outputs/real_full_selected_local/vocab.jsonl
  reuse_vocab: true
  min_freq: 2
  max_vocab_size: 262144
  max_source_tokens: 1024
  max_target_tokens: 128
  max_numeric_targets: 16
  enforce_sequence_only_molecules: true
  forbid_actual_structure_files: true
  allow_geometric_features: false
  extra_vocab_paths:
    - data/processed/reference_tokens/naturelm_unigenx_tokens.txt
    - data/processed/reference_tokens/multimodal_graph_tokens.txt
  order_mode: sample
